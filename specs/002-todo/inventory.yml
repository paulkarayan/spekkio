    method: GET
    path: /todos/search
    source: app.py:108-115
    handler_function: search_todos

  authentication:
    required: true
    method: "X-User-Id header"

  inputs:
    path_params: []
    query_params:
      - name: q
        type: str
        required: false
        default: '""'
    body: []

  outputs:
    success:
      status: 200
      body: "[{todo dict from raw SQL}]"
    errors:
      - status: 401
        condition: "Missing X-User-Id header"

  side_effects: []

  observations:
    - |
      [ANOMALY id=ANO-014 source=app.py:113]
      SQL INJECTION: User input interpolated directly into SQL query via f-string.
      Both user_id and q parameters are unsanitized.
      Question: Is this a critical security vulnerability?
      Recommendation: Use parameterized queries immediately.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-015 source=app.py:108-115]
      Search returns raw SQL rows, not ORM objects — different response shape than other endpoints.
      Question: Should search use the same to_dict() format?
      Recommendation: Use ORM query for consistency.
      [/ANOMALY]
