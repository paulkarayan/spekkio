# ============================================================
# Endpoint 2: Create User
# ============================================================

- endpoint:
    method: POST
    path: /users
    source: app.py:21-33
    handler_function: create_user

  authentication:
    required: false
    method: none

  inputs:
    path_params: []
    query_params: []
    body:
      - name: name
        type: str
        validation: "None — KeyError if missing"
        constraints: "No length or format validation"
      - name: email
        type: str
        validation: "None — KeyError if missing"
        constraints: "No email format validation, no uniqueness check"
      - name: password
        type: str
        validation: "None — KeyError if missing"
        constraints: "No complexity requirements"

  outputs:
    success:
      status: 201
      body: '{"id": int, "name": str, "email": str}'
    errors:
      - status: 500
        condition: "Missing required fields (unhandled KeyError)"

  side_effects:
    - "Creates User row with plain-text password"

  observations:
    - |
      [ANOMALY id=ANO-001 source=app.py:28]
      Password stored as plain text — no hashing.
      Question: Is this intentional for a prototype?
      Recommendation: Hash passwords with bcrypt or argon2.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-002 source=app.py:23]
      No duplicate email check — multiple accounts with same email allowed.
      Question: Should emails be unique?
      Recommendation: Add unique constraint on email column and check before insert.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-003 source=app.py:21-33]
      No input validation — missing fields cause unhandled KeyError (500).
      Question: Should missing fields return 400 with helpful message?
      Recommendation: Validate required fields and return proper error responses.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-004 source=app.py:7]
      Hardcoded SECRET_KEY in source code: "super-secret-key-123".
      Question: Should this come from environment variables?
      Recommendation: Move secret to environment variable or config file.
      [/ANOMALY]

