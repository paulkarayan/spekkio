# Endpoint 5: Create Todo
# ============================================================

- endpoint:
    method: POST
    path: /todos
    source: app.py:57-72
    handler_function: create_todo

  authentication:
    required: true
    method: "X-User-Id header"

  inputs:
    path_params: []
    query_params: []
    body:
      - name: title
        type: str
        validation: "None — KeyError if missing"
        constraints: "No length validation"
      - name: description
        type: str
        validation: "Optional, defaults to empty string"
        constraints: "None"
      - name: priority
        type: str
        validation: "None — any string accepted"
        constraints: "Defaults to 'medium' but no enum validation"
      - name: due_date
        type: str
        validation: "Parsed via datetime.fromisoformat()"
        constraints: "Optional; invalid format causes unhandled ValueError"

  outputs:
    success:
      status: 201
      body: "{todo object}"
    errors:
      - status: 401
        condition: "Missing X-User-Id header"
      - status: 500
        condition: "Missing title (KeyError) or invalid due_date (ValueError)"

  side_effects:
    - "Creates Todo row linked to user_id"

  observations:
    - |
      [ANOMALY id=ANO-009 source=app.py:67]
      No validation on priority values — accepts any string, not just low/medium/high.
      Question: Should priority be constrained to an enum?
      Recommendation: Validate against allowed values.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-010 source=app.py:68]
      Invalid due_date format causes unhandled ValueError (500 error).
      Question: Should invalid dates return 400 with helpful message?
      Recommendation: Wrap in try/except and return proper error.
      [/ANOMALY]

# ============================================================
# Endpoint 6: Update Todo
# ============================================================

- endpoint:
    method: PUT
    path: /todos/<todo_id>
    source: app.py:75-93
    handler_function: update_todo

  authentication:
    required: true
    method: "X-User-Id header"

  inputs:
    path_params:
      - name: todo_id
        type: int
        validation: "Flask URL converter"
    query_params: []
    body:
      - name: title
        type: str
        validation: "Optional"
        constraints: "None"
      - name: description
        type: str
        validation: "Optional"
        constraints: "None"
      - name: completed
        type: bool
        validation: "Optional; sets completed_at timestamp when true"
        constraints: "None"
      - name: priority
        type: str
        validation: "Optional; no enum validation"
        constraints: "None"

  outputs:
    success:
      status: 200
      body: "{updated todo object}"
    errors:
      - status: 401
        condition: "Missing X-User-Id header"
      - status: 404
        condition: "Todo not found"

  side_effects:
    - "Updates Todo row fields"
    - "Sets completed_at timestamp when completed=true"

  observations:
    - |
      [ANOMALY id=ANO-011 source=app.py:82]
      IDOR vulnerability: No check that todo.user_id matches requesting user.
      Any authenticated user can update any other user's todo by ID.
      Question: Is this a security bug?
      Recommendation: Add ownership check: if todo.user_id != int(user_id): return 403.
      [/ANOMALY]

