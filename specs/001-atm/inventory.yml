# ============================================================

- endpoint:
    method: POST
    path: /transactions/deposit
    source: routes/transactions.py:25-38
    handler_function: deposit

  authentication:
    required: true
    method: "PIN via headers (x-account-number, x-pin) using verify_pin dependency"

  inputs:
    path_params: []
    query_params: []
    body:
      - name: amount
        type: float
        validation: "Must be > 0"
        constraints: "No upper limit on deposit amount"

  outputs:
    success:
      status: 201
      body: '{"message": "Deposit successful", "new_balance": float}'
    errors:
      - status: 400
        condition: "Amount is zero or negative"
      - status: 401
        condition: "Authentication failure"
      - status: 422
        condition: "Request body validation failure"

  side_effects:
    - "Increments account.balance by request.amount"
    - "Creates Transaction row with type=DEPOSIT"

  observations:
    - |
      [ANOMALY id=ANO-008 source=routes/transactions.py:25-38]
      No maximum deposit limit — arbitrarily large amounts can be deposited.
      Question: Should there be a per-transaction or daily deposit cap?
      Recommendation: Add configurable deposit limits.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-009 source=models.py:22]
      Float used for monetary amounts — potential floating-point precision issues.
      Question: Could rounding cause balance discrepancies?
      Recommendation: Use Decimal or integer cents for monetary values.
      [/ANOMALY]

# ============================================================
# Endpoint 6: Withdraw
# ============================================================

- endpoint:
    method: POST
    path: /transactions/withdraw
    source: routes/transactions.py:41-57
    handler_function: withdraw

  authentication:
    required: true
    method: "PIN via headers (x-account-number, x-pin) using verify_pin dependency"

  inputs:
    path_params: []
    query_params: []
    body:
      - name: amount
        type: float
        validation: "Must be > 0; must not exceed current balance"
        constraints: "No daily/per-transaction withdrawal limit"

  outputs:
    success:
      status: 201
      body: '{"message": "Withdrawal successful", "new_balance": float}'
    errors:
      - status: 400
        condition: "Amount is zero or negative"
      - status: 400
        condition: "Insufficient funds (balance < amount)"
      - status: 401
        condition: "Authentication failure"
      - status: 422
        condition: "Request body validation failure"

  side_effects:
    - "Decrements account.balance by request.amount"
    - "Creates Transaction row with type=WITHDRAWAL"

  observations:
    - |
      [ANOMALY id=ANO-010 source=routes/transactions.py:45]
      No withdrawal limit per transaction or per day — can withdraw any amount up to full balance.
      Question: Should ATM-style withdrawal limits exist?
      Recommendation: Add configurable withdrawal limits.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-011 source=routes/transactions.py:46-48]
      No concurrency control on balance check and update — race condition possible.
      Question: Could concurrent withdrawals cause overdraft?
      Recommendation: Add optimistic locking or SELECT FOR UPDATE.
      [/ANOMALY]

# ============================================================
# Endpoint 7: Transfer
# ============================================================

- endpoint:
    method: POST
    path: /transactions/transfer
    source: routes/transactions.py:60-93
    handler_function: transfer

  authentication:
    required: true
    method: "PIN via headers (x-account-number, x-pin) using verify_pin dependency"

  inputs:
    path_params: []
    query_params: []
    body:
      - name: target_account_number
        type: str
        validation: "Must exist in database; must not be same as source account"
        constraints: "No format validation"
      - name: amount
        type: float
        validation: "Must be > 0; must not exceed source account balance"
        constraints: "No transfer limit"

  outputs:
    success:
      status: 201
      body: '{"message": "Transfer successful", "new_balance": float}'
    errors:
      - status: 400
        condition: "Amount is zero or negative"
      - status: 400
        condition: "Insufficient funds (balance < amount)"
      - status: 400
        condition: "Target account is same as source account"
      - status: 404
        condition: "Target account not found"
      - status: 401
        condition: "Authentication failure"
      - status: 422
        condition: "Request body validation failure"

  side_effects:
    - "Decrements source account.balance by amount"
    - "Increments target account.balance by amount"
    - "Creates two Transaction rows: one for sender (TRANSFER), one for receiver (TRANSFER)"

  observations:
    - |
      [ANOMALY id=ANO-012 source=routes/transactions.py:60-93]
      No transfer limit per transaction or per day.
      Question: Should transfer limits exist?
      Recommendation: Add configurable transfer limits.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-013 source=routes/transactions.py:65-69]
      Balance check occurs before target account lookup — error priority may confuse users.
      Question: Is this error ordering intentional?
      Recommendation: Check target account first for better UX.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-014 source=routes/transactions.py:73-74]
      No concurrency control on dual balance update — race condition on concurrent transfers.
      Question: Could concurrent transfers cause inconsistent balances?
      Recommendation: Add database-level locking.
      [/ANOMALY]
