# ============================================================
# Endpoint 2: Create Account
# ============================================================

- endpoint:
    method: POST
    path: /accounts/
    source: routes/accounts.py:25-38
    handler_function: create_account

  authentication:
    required: false
    method: none

  inputs:
    path_params: []
    query_params: []
    body:
      - name: account_number
        type: str
        validation: "Pydantic required field; uniqueness checked against DB"
        constraints: "No format validation (length, pattern, etc.)"
      - name: holder_name
        type: str
        validation: "Pydantic required field"
        constraints: "No length or character validation"
      - name: pin
        type: str
        validation: "Pydantic required field"
        constraints: "No length, format, or complexity validation"

  outputs:
    success:
      status: 201
      body: '{"id": int, "account_number": str, "holder_name": str, "balance": float}'
    errors:
      - status: 400
        condition: "Account number already exists in database"
      - status: 422
        condition: "Request body validation failure (missing/invalid fields)"

  side_effects:
    - "Creates new Account row in accounts table with balance=0.0"
    - "PIN stored as plain text in database (no hashing)"

  observations:
    - |
      [ANOMALY id=ANO-002 source=routes/accounts.py:33]
      PIN is stored as plain text in the database.
      Question: Is this intentional for a demo, or a security bug?
      Recommendation: Hash PINs with bcrypt or argon2.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-003 source=routes/accounts.py:12-15]
      No validation on account_number format — could be empty string, special characters, any length.
      Question: Should account numbers follow a specific format (e.g., numeric, fixed length)?
      Recommendation: Add regex or length validation.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-004 source=routes/accounts.py:12-15]
      No validation on PIN complexity or length — could be empty string or single character.
      Question: Should PINs be required to be exactly 4 digits?
      Recommendation: Add PIN format constraint.
      [/ANOMALY]
    - |
      [ANOMALY id=ANO-005 source=routes/accounts.py:12-15]
      No validation on holder_name — empty strings accepted.
      Question: Should holder names have a minimum length?
      Recommendation: Add minimum length validation.
      [/ANOMALY]

