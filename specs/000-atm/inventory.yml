# ============================================================
# Endpoint 5: Deposit
# ============================================================

- endpoint:
    method: POST
    path: /transactions/deposit
    source: routes/transactions.py:26-38
    handler_function: deposit

  authentication:
    required: true
    method: "PIN via headers (x-account-number, x-pin) using verify_pin dependency"

  inputs:
    path_params: []
    query_params: []
    body:
      - name: amount
        type: float
        validation: "Must be > 0"
        constraints: "No upper limit on deposit amount"

  outputs:
    success:
      status: 201
      body: '{"message": "Deposit successful", "new_balance": float}'
    errors:
      - status: 400
        condition: "Amount is zero or negative"
      - status: 401
        condition: "Authentication failure"
      - status: 422
        condition: "Request body validation failure"

  side_effects:
    - "Increments account.balance by request.amount"
    - "Creates Transaction row with type=DEPOSIT"

  observations:
    - "No maximum deposit limit"
    - "Uses float for monetary amounts (potential floating-point precision issues)"
    - "Balance update and transaction creation are not in an explicit DB transaction (relies on SQLAlchemy session auto-transaction)"

# ============================================================
# Endpoint 6: Withdraw
# ============================================================

- endpoint:
    method: POST
    path: /transactions/withdraw
    source: routes/transactions.py:42-57
    handler_function: withdraw

  authentication:
    required: true
    method: "PIN via headers (x-account-number, x-pin) using verify_pin dependency"

  inputs:
    path_params: []
    query_params: []
    body:
      - name: amount
        type: float
        validation: "Must be > 0; must not exceed current balance"
        constraints: "No daily/per-transaction withdrawal limit"

  outputs:
    success:
      status: 201
      body: '{"message": "Withdrawal successful", "new_balance": float}'
    errors:
      - status: 400
        condition: "Amount is zero or negative"
      - status: 400
        condition: "Insufficient funds (balance < amount)"
      - status: 401
        condition: "Authentication failure"
      - status: 422
        condition: "Request body validation failure"

  side_effects:
    - "Decrements account.balance by request.amount"
    - "Creates Transaction row with type=WITHDRAWAL"

  observations:
    - "ANOMALY: No withdrawal limit per transaction or per day (routes/transactions.py:45)"
    - "Uses float for monetary amounts (potential floating-point precision issues)"
    - "No concurrency control (race condition on balance check + update)"

# ============================================================
# Endpoint 7: Transfer
# ============================================================

- endpoint:
    method: POST
    path: /transactions/transfer
    source: routes/transactions.py:61-93
    handler_function: transfer

  authentication:
    required: true
    method: "PIN via headers (x-account-number, x-pin) using verify_pin dependency"

  inputs:
    path_params: []
    query_params: []
    body:
      - name: target_account_number
        type: str
        validation: "Must exist in database; must not be same as source account"
        constraints: "No format validation"
      - name: amount
        type: float
        validation: "Must be > 0; must not exceed source account balance"
        constraints: "No transfer limit"

  outputs:
    success:
      status: 201
      body: '{"message": "Transfer successful", "new_balance": float}'
    errors:
      - status: 400
        condition: "Amount is zero or negative"
      - status: 400
        condition: "Insufficient funds (balance < amount)"
      - status: 400
        condition: "Target account is same as source account"
      - status: 404
        condition: "Target account not found"
      - status: 401
        condition: "Authentication failure"
      - status: 422
        condition: "Request body validation failure"

  side_effects:
    - "Decrements source account.balance by amount"
    - "Increments target account.balance by amount"
    - "Creates two Transaction rows: one for sender (TRANSFER), one for receiver (TRANSFER)"
    - "Both transaction records reference the other account via target_account_id"

  observations:
    - "ANOMALY: No transfer limit per transaction or per day"
    - "Balance check happens before target account lookup (order could matter for error messaging)"
    - "Uses float for monetary amounts (potential floating-point precision issues)"
    - "No concurrency control (race condition on dual balance update)"
    - "Not wrapped in explicit database transaction (relies on session auto-transaction; both balance updates and both transaction inserts commit together)"
    - "Self-transfer is explicitly prevented (routes/transactions.py:70-71)"
